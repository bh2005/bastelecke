<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NagVis 3D | Multi-Level Topology</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hud">
        <header id="header" class="panel">
            <div class="logo">NAGVIS 3D <span class="subtitle">| ARCHITECTURE_VIEW</span></div>
            
            <div id="mode-selector">
                <select id="view-mode">
                    <option value="mine">MODE: DEEP_MINING (Down)</option>
                    <option value="building">MODE: HIGH_RISE (Up)</option>
                </select>
            </div>

            <div class="status">ENGINE: <span class="active-glow">ONLINE</span></div>
        </header>

        <div id="search-container">
            <input type="text" id="search-input" placeholder="SEARCH_NODE_ID..." autocomplete="off">
            <div id="search-results"></div>
        </div>

        <div id="bottom-row">
            <div id="event-log" class="panel">
                <div class="log-header">SYSTEM_LOG:</div>
                <div id="log-content"></div>
            </div>
            <div id="controls" class="panel">
                <label>FLOW_SPEED</label>
                <input type="range" id="flow-slider" min="0" max="100" value="35">
                <button id="orbit-btn">TOGGLE_ORBIT</button>
            </div>
        </div>
    </div>

    <div id="inspector">
        <span class="close-btn" id="close-inspector">[ CLOSE_X ]</span>
        <div id="ins-header">
            <h2 id="ins-label">NODE_NAME</h2>
            <code id="ins-id">ID: ---</code>
        </div>
        <hr style="border:0; border-top:1px solid #13d38e33; margin:20px 0;">
        <div id="ins-content"></div>
    </div>

    <div id="ins-actions" style="margin-top: 20px;">
        <button id="view-2d-btn" style="width: 100%; border-color: #00ccff; color: #00ccff;">
        SWITCH TO 2D ROOMPLAN
        </button>
    </div>

    <div id="canvas-container"></div>

    <script src="app.js"></script>
</body>
</html>
